<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" font-family="Segoe UI, Arial, sans-serif">
<rect fill="#0f172a" width="360" height="140" rx="8"/>

<!-- Top row: unseparated (bad) -->
<text fill="#f87171" font-size="9" font-weight="600" x="180" y="16" text-anchor="middle">分けない場合</text>
<rect fill="#450a0a" stroke="#991b1b" stroke-width="0.5" x="40" y="22" width="280" height="30" rx="6"/>
<text fill="#fca5a5" font-size="10" x="180" y="36" text-anchor="middle" dominant-baseline="central">判断 + 監視 + 実行 → 全劣化</text>
<text fill="#f87171" font-size="8" x="180" y="50" text-anchor="middle" font-weight="500">コンテキスト過負荷で品質が崩壊</text>

<!-- Arrow down -->
<text fill="#38bdf8" font-size="12" font-weight="600" x="180" y="68" text-anchor="middle">↓ 構造制御で分離</text>

<!-- Bottom row: separated (good) -->
<text fill="#4ade80" font-size="9" font-weight="600" x="180" y="84" text-anchor="middle">分けた場合 — 各層が専門化 → 品質維持</text>
<rect fill="#052e16" stroke="#22c55e" stroke-width="0.5" x="12" y="90" width="100" height="32" rx="6"/>
<text fill="#22c55e" font-size="11" font-weight="600" x="62" y="104" text-anchor="middle" dominant-baseline="central">監督</text>
<text fill="#86efac" font-size="8" x="62" y="118" text-anchor="middle">判断</text>

<text fill="#94a3b8" font-size="11" x="122" y="106" text-anchor="middle">→</text>

<rect fill="#0c1a3d" stroke="#60a5fa" stroke-width="0.5" x="130" y="90" width="100" height="32" rx="6"/>
<text fill="#60a5fa" font-size="11" font-weight="600" x="180" y="104" text-anchor="middle" dominant-baseline="central">中継</text>
<text fill="#93c5fd" font-size="8" x="180" y="118" text-anchor="middle">監視</text>

<text fill="#94a3b8" font-size="11" x="240" y="106" text-anchor="middle">→</text>

<rect fill="#1c1305" stroke="#f59e0b" stroke-width="0.5" x="248" y="90" width="100" height="32" rx="6"/>
<text fill="#f59e0b" font-size="11" font-weight="600" x="298" y="104" text-anchor="middle" dominant-baseline="central">作業</text>
<text fill="#fcd34d" font-size="8" x="298" y="118" text-anchor="middle">実行</text>
</svg>