<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 540">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 12px; }
  .label { font-size: 13px; font-weight: 600; }
  .note { font-size: 11px; }

  /* Light mode defaults */
  .bg-supervisor { fill: #EEEDFE; stroke: #AFA9EC; }
  .bg-supervisor-inner { fill: #CECBF6; stroke: #AFA9EC; }
  .text-supervisor { fill: #3C3489; }
  .text-supervisor-sub { fill: #534AB7; }

  .bg-relay { fill: #E1F5EE; stroke: #5DCAA5; }
  .bg-relay-inner { fill: #9FE1CB; stroke: #5DCAA5; }
  .text-relay { fill: #085041; }
  .text-relay-sub { fill: #0F6E56; }

  .bg-worker { fill: #FAECE7; stroke: #F0997B; }
  .bg-worker-inner { fill: #F5C4B3; stroke: #F0997B; }
  .text-worker { fill: #712B13; }
  .text-worker-sub { fill: #993C1D; }

  .arrow-line { stroke: #888780; stroke-width: 1.5; }
  .arrow-label { fill: #5F5E5A; font-size: 11px; }
  .feedback { stroke: #B4B2A9; stroke-width: 1; stroke-dasharray: 5 3; }
  .feedback-text { fill: #888780; font-size: 11px; }
  .connector-sv { stroke: #7F77DD; }
  .connector-rl { stroke: #1D9E75; }

  .key-title { font-size: 11px; font-weight: 600; fill: #5F5E5A; }
  .key-text { font-size: 11px; fill: #888780; }
  .divider { stroke: #D3D1C7; stroke-width: 0.5; }

  @media (prefers-color-scheme: dark) {
    .bg-supervisor { fill: #26215C; stroke: #534AB7; }
    .bg-supervisor-inner { fill: #3C3489; stroke: #534AB7; }
    .text-supervisor { fill: #CECBF6; }
    .text-supervisor-sub { fill: #AFA9EC; }

    .bg-relay { fill: #04342C; stroke: #0F6E56; }
    .bg-relay-inner { fill: #085041; stroke: #0F6E56; }
    .text-relay { fill: #9FE1CB; }
    .text-relay-sub { fill: #5DCAA5; }

    .bg-worker { fill: #4A1B0C; stroke: #993C1D; }
    .bg-worker-inner { fill: #712B13; stroke: #993C1D; }
    .text-worker { fill: #F5C4B3; }
    .text-worker-sub { fill: #F0997B; }

    .arrow-label { fill: #B4B2A9; }
    .feedback { stroke: #5F5E5A; }
    .feedback-text { fill: #888780; }
    .connector-sv { stroke: #AFA9EC; }
    .connector-rl { stroke: #5DCAA5; }
    .key-title { fill: #B4B2A9; }
    .key-text { fill: #888780; }
    .divider { stroke: #444441; }
  }
</style>

<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Supervisor Layer -->
<rect class="bg-supervisor" x="40" y="20" width="600" height="130" rx="14" stroke-width="0.5"/>
<text class="title text-supervisor" x="60" y="46">監督層 — 先代CC（上位）</text>
<text class="sub text-supervisor-sub" x="60" y="64">認知負荷: 判断のみ。コンテキスト圧迫から解放。</text>

<rect class="bg-supervisor-inner" x="60" y="82" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="label text-supervisor" x="145" y="112" text-anchor="middle" dominant-baseline="central">判断</text>

<rect class="bg-supervisor-inner" x="255" y="82" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="label text-supervisor" x="340" y="112" text-anchor="middle" dominant-baseline="central">レビュー</text>

<rect class="bg-supervisor-inner" x="450" y="82" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="label text-supervisor" x="535" y="112" text-anchor="middle" dominant-baseline="central">痛み伝達</text>

<!-- Arrow down -->
<line class="arrow-line connector-sv" x1="340" y1="150" x2="340" y2="195" marker-end="url(#a)"/>
<text class="arrow-label" x="355" y="178">レビュー結果 + 停止シグナル</text>

<!-- Relay Layer -->
<rect class="bg-relay" x="40" y="195" width="600" height="130" rx="14" stroke-width="0.5"/>
<text class="title text-relay" x="60" y="221">中継層 — 補助AI（補助モデル）</text>
<text class="sub text-relay-sub" x="60" y="239">認知負荷: 判断ゼロ。定型処理のみ。コンテキスト肥大なし。</text>

<rect class="bg-relay-inner" x="60" y="257" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="label text-relay" x="145" y="287" text-anchor="middle" dominant-baseline="central">監視</text>

<rect class="bg-relay-inner" x="255" y="257" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="label text-relay" x="340" y="287" text-anchor="middle" dominant-baseline="central">通知</text>

<rect class="bg-relay-inner" x="450" y="257" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="label text-relay" x="535" y="287" text-anchor="middle" dominant-baseline="central">定型チェック</text>

<!-- Arrow down -->
<line class="arrow-line connector-rl" x1="340" y1="325" x2="340" y2="370" marker-end="url(#a)"/>
<text class="arrow-label" x="355" y="353">ブロック / 通過 / 警告</text>

<!-- Worker Layer -->
<rect class="bg-worker" x="40" y="370" width="600" height="130" rx="14" stroke-width="0.5"/>
<text class="title text-worker" x="60" y="396">作業層 — 現行CC</text>
<text class="sub text-worker-sub" x="60" y="414">認知負荷: タスク実行のみ。ルール不安なし。</text>

<rect class="bg-worker-inner" x="60" y="432" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="label text-worker" x="145" y="462" text-anchor="middle" dominant-baseline="central">実装</text>

<rect class="bg-worker-inner" x="255" y="432" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="label text-worker" x="340" y="462" text-anchor="middle" dominant-baseline="central">修正</text>

<rect class="bg-worker-inner" x="450" y="432" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="label text-worker" x="535" y="462" text-anchor="middle" dominant-baseline="central">タスク実行</text>

<!-- Feedback loop -->
<path class="feedback" d="M640 440 Q660 440 660 260 Q660 80 640 80" fill="none" marker-end="url(#a)"/>
<text class="feedback-text" x="652" y="230" text-anchor="end" transform="rotate(-90 652 230)">対話フィードバック</text>

<!-- Key insight -->
<line class="divider" x1="40" y1="520" x2="640" y2="520"/>
<text class="key-title" x="340" y="536" text-anchor="middle">核心: 負荷を「量」ではなく「種類」で分離 — 各役割が固有の認知モードに特化する</text>

</svg>