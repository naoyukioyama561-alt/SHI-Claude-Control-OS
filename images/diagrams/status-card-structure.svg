<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" font-family="Segoe UI, Arial, sans-serif">
  <rect width="400" height="180" fill="#0f172a" rx="10"/>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">なぜ3層に分けるのか</text>

  <!-- Left: unseparated (bad) -->
  <text x="100" y="38" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">分けない場合</text>
  <rect x="20" y="44" width="160" height="90" rx="8" fill="#450a0a" stroke="#991b1b" stroke-width="0.5"/>
  <text x="100" y="64" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="500">1つのAI</text>
  <line x1="40" y1="72" x2="160" y2="72" stroke="#7f1d1d" stroke-width="0.5"/>
  <text x="100" y="86" text-anchor="middle" fill="#fca5a5" font-size="8">判断 + 監視 + 実行</text>
  <text x="100" y="100" text-anchor="middle" fill="#fca5a5" font-size="8">全て同一コンテキスト</text>
  <text x="100" y="118" text-anchor="middle" fill="#f87171" font-size="8" font-weight="600">混在 → 劣化</text>

  <!-- Center arrow -->
  <text x="200" y="92" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="600">→</text>
  <text x="200" y="106" text-anchor="middle" fill="#38bdf8" font-size="8">構造制御</text>

  <!-- Right: separated (good) -->
  <text x="300" y="38" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">分けた場合</text>
  <rect x="220" y="44" width="160" height="26" rx="5" fill="#052e16" stroke="#22c55e" stroke-width="0.5"/>
  <text x="300" y="61" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="500">監督 -- 判断</text>
  <rect x="220" y="74" width="160" height="26" rx="5" fill="#0c1a3d" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="300" y="91" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="500">中継 -- 監視</text>
  <rect x="220" y="104" width="160" height="26" rx="5" fill="#1c1305" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="300" y="121" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="500">作業 -- 実行</text>
  <text x="300" y="144" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="600">専門化 → 品質維持</text>

  <!-- Bottom summary -->
  <line x1="14" y1="156" x2="386" y2="156" stroke="#334155" stroke-width="0.5"/>
  <text x="200" y="172" text-anchor="middle" fill="#94a3b8" font-size="8">負荷を「量」ではなく「種類」で分離することで、各層の品質を維持する。</text>
</svg>