<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 460">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 12px; }
  .note { font-size: 11px; }

  .bg-l0 { fill: #F1EFE8; stroke: #B4B2A9; }
  .t-l0 { fill: #2C2C2A; } .ts-l0 { fill: #5F5E5A; }

  .bg-l1 { fill: #E6F1FB; stroke: #85B7EB; }
  .t-l1 { fill: #0C447C; } .ts-l1 { fill: #185FA5; }

  .bg-l2 { fill: #E1F5EE; stroke: #5DCAA5; }
  .t-l2 { fill: #085041; } .ts-l2 { fill: #0F6E56; }

  .bg-l3 { fill: #FAEEDA; stroke: #FAC775; }
  .t-l3 { fill: #412402; } .ts-l3 { fill: #854F0B; }

  .bg-l4 { fill: #FCEBEB; stroke: #F09595; }
  .t-l4 { fill: #501313; } .ts-l4 { fill: #A32D2D; }

  .arrow-line { stroke: #888780; stroke-width: 1; }
  .cascade { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
  .catch-text { font-size: 11px; fill: #5F5E5A; }
  .divider { stroke: #D3D1C7; stroke-width: 0.5; }
  .key-text { font-size: 11px; fill: #888780; }
  .key-title { font-size: 11px; font-weight: 600; fill: #5F5E5A; }

  @media (prefers-color-scheme: dark) {
    .bg-l0 { fill: #2C2C2A; stroke: #5F5E5A; }
    .t-l0 { fill: #D3D1C7; } .ts-l0 { fill: #B4B2A9; }

    .bg-l1 { fill: #042C53; stroke: #185FA5; }
    .t-l1 { fill: #B5D4F4; } .ts-l1 { fill: #85B7EB; }

    .bg-l2 { fill: #04342C; stroke: #0F6E56; }
    .t-l2 { fill: #9FE1CB; } .ts-l2 { fill: #5DCAA5; }

    .bg-l3 { fill: #412402; stroke: #854F0B; }
    .t-l3 { fill: #FAC775; } .ts-l3 { fill: #EF9F27; }

    .bg-l4 { fill: #501313; stroke: #A32D2D; }
    .t-l4 { fill: #F7C1C1; } .ts-l4 { fill: #F09595; }

    .catch-text { fill: #B4B2A9; }
    .cascade { stroke: #5F5E5A; }
    .divider { stroke: #444441; }
    .key-text { fill: #888780; }
    .key-title { fill: #B4B2A9; }
  }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer 0 -->
<rect class="bg-l0" x="40" y="20" width="420" height="58" rx="10" stroke-width="0.5"/>
<text class="title t-l0" x="60" y="43">Layer 0 — Observation gate</text>
<text class="sub ts-l0" x="60" y="62">Observe → define target → get approval</text>
<text class="catch-text" x="490" y="43">Prevents starting</text>
<text class="catch-text" x="490" y="58">without understanding</text>

<line class="arrow-line" x1="250" y1="78" x2="250" y2="98" marker-end="url(#a)"/>

<!-- Layer 1 -->
<rect class="bg-l1" x="40" y="98" width="420" height="58" rx="10" stroke-width="0.5"/>
<text class="title t-l1" x="60" y="121">Layer 1 — Self-detection</text>
<text class="sub ts-l1" x="60" y="140">AI catches its own obvious mistakes</text>
<text class="catch-text" x="490" y="121">Catches obvious errors</text>

<line class="arrow-line" x1="250" y1="156" x2="250" y2="176" marker-end="url(#a)"/>

<!-- Layer 2 -->
<rect class="bg-l2" x="40" y="176" width="420" height="58" rx="10" stroke-width="0.5"/>
<text class="title t-l2" x="60" y="199">Layer 2 — Structural hooks + watchers</text>
<text class="sub ts-l2" x="60" y="218">External auto-detect + block</text>
<text class="catch-text" x="490" y="199">Catches what self-</text>
<text class="catch-text" x="490" y="214">monitoring misses</text>

<line class="arrow-line" x1="250" y1="234" x2="250" y2="254" marker-end="url(#a)"/>

<!-- Layer 3 -->
<rect class="bg-l3" x="40" y="254" width="420" height="58" rx="10" stroke-width="0.5"/>
<text class="title t-l3" x="60" y="277">Layer 3 — Completion definition</text>
<text class="sub ts-l3" x="60" y="296">Evidence + 5-set inspection</text>
<text class="catch-text" x="490" y="277">Catches incomplete</text>
<text class="catch-text" x="490" y="292">or unverified work</text>

<line class="arrow-line" x1="250" y1="312" x2="250" y2="332" marker-end="url(#a)"/>

<!-- Layer 4 -->
<rect class="bg-l4" x="40" y="332" width="420" height="58" rx="10" stroke-width="0.5"/>
<text class="title t-l4" x="60" y="355">Layer 4 — Third-party verification</text>
<text class="sub ts-l4" x="60" y="374">Pattern escalation + incident logging</text>
<text class="catch-text" x="490" y="355">Catches systemic</text>
<text class="catch-text" x="490" y="370">patterns</text>

<!-- Cascade annotation -->
<path class="cascade" d="M470 40 Q478 210 470 375" fill="none"/>

<!-- 5-set box -->
<line class="divider" x1="40" y1="410" x2="640" y2="410"/>
<text class="key-title" x="40" y="432">Required 5-set for every completion report:</text>
<text class="key-text" x="40" y="450">Preconditions → Prohibitions → Execution observation → Pass criteria → Rollback procedure</text>

</svg>
