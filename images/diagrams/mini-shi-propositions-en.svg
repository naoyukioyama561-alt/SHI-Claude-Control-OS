<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" font-family="Segoe UI, Arial, sans-serif">
<rect fill="#0f172a" width="400" height="160" rx="8"/>

<!-- Title -->
<text fill="#e2e8f0" font-size="10" font-weight="600" x="200" y="14" text-anchor="middle">SHI Theory: Without vs With</text>

<!-- Left column: Without SHI (problems) -->
<text fill="#f87171" font-size="8" font-weight="600" x="100" y="28" text-anchor="middle">Without SHI (problems)</text>

<rect fill="#450a0a" stroke="#991b1b" stroke-width="0.5" x="8" y="34" width="174" height="24" rx="4"/>
<text fill="#fca5a5" font-size="7.5" x="95" y="49" text-anchor="middle">Won't act without authority</text>

<rect fill="#450a0a" stroke="#991b1b" stroke-width="0.5" x="8" y="62" width="174" height="24" rx="4"/>
<text fill="#fca5a5" font-size="7.5" x="95" y="77" text-anchor="middle">Frames disappear (no inheritance)</text>

<rect fill="#450a0a" stroke="#991b1b" stroke-width="0.5" x="8" y="90" width="174" height="24" rx="4"/>
<text fill="#fca5a5" font-size="7.5" x="95" y="105" text-anchor="middle">Halts under information gaps</text>

<rect fill="#450a0a" stroke="#991b1b" stroke-width="0.5" x="8" y="118" width="174" height="24" rx="4"/>
<text fill="#fca5a5" font-size="7.5" x="95" y="133" text-anchor="middle">Depends on conscious reasoning (fragile)</text>

<!-- Center arrows -->
<text fill="#38bdf8" font-size="10" font-weight="600" x="200" y="49" text-anchor="middle">→</text>
<text fill="#38bdf8" font-size="10" font-weight="600" x="200" y="77" text-anchor="middle">→</text>
<text fill="#38bdf8" font-size="10" font-weight="600" x="200" y="105" text-anchor="middle">→</text>
<text fill="#38bdf8" font-size="10" font-weight="600" x="200" y="133" text-anchor="middle">→</text>

<!-- Right column: With SHI (solutions) -->
<text fill="#4ade80" font-size="8" font-weight="600" x="308" y="28" text-anchor="middle">With SHI (effects)</text>

<rect fill="#052e16" stroke="#22c55e" stroke-width="0.5" x="218" y="34" width="174" height="24" rx="4"/>
<text fill="#86efac" font-size="7.5" x="305" y="44" text-anchor="middle">P1: Alignment fires without authority</text>
<text fill="#4ade80" font-size="6.5" x="305" y="54" text-anchor="middle">Structural conditions enable autonomy</text>

<rect fill="#052e16" stroke="#22c55e" stroke-width="0.5" x="218" y="62" width="174" height="24" rx="4"/>
<text fill="#86efac" font-size="7.5" x="305" y="72" text-anchor="middle">P2: Frame self-replication</text>
<text fill="#4ade80" font-size="6.5" x="305" y="82" text-anchor="middle">Pain experience inherited to next gen</text>

<rect fill="#052e16" stroke="#22c55e" stroke-width="0.5" x="218" y="90" width="174" height="24" rx="4"/>
<text fill="#86efac" font-size="7.5" x="305" y="100" text-anchor="middle">P3: Judgment under info gap</text>
<text fill="#4ade80" font-size="6.5" x="305" y="110" text-anchor="middle">Structure compensates for missing info</text>

<rect fill="#052e16" stroke="#22c55e" stroke-width="0.5" x="218" y="118" width="174" height="24" rx="4"/>
<text fill="#86efac" font-size="7.5" x="305" y="128" text-anchor="middle">T-1: No conscious agent needed</text>
<text fill="#4ade80" font-size="6.5" x="305" y="138" text-anchor="middle">Structure replaces conscious reasoning</text>

<!-- Bottom -->
<text fill="#94a3b8" font-size="8" x="200" y="154" text-anchor="middle">Structural conditions determine alignment firing. Consciousness is unnecessary.</text>
</svg>