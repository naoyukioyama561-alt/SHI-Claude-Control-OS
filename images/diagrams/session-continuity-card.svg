<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Arial, sans-serif">
  <desc>著者の単一環境・単一オペレーターでの観測値。N未公開。個別に [design target] や [illustrative] と記載のない限り、全ての指標は [observed: 単一環境] です。ご自身の環境で検証してください。</desc>
  <!-- Background -->
  <rect width="680" height="320" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">単一セッション継続稼働証跡</text>
  <text x="340" y="41" text-anchor="middle" fill="#64748b" font-size="7">著者の環境での観測</text>
  <text x="340" y="48" text-anchor="middle" fill="#94a3b8" font-size="10">サーバ側記録時刻。DB再クエリで再現可能。</text>

  <!-- STABLE badge -->
  <rect x="290" y="56" width="100" height="22" fill="#22c55e" fill-opacity="0.15" rx="11" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="71" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">STABLE</text>

  <!-- Card grid: 2 rows x 4 cols -->
  <!-- Row 1 -->
  <rect x="20" y="90" width="150" height="72" fill="#1e293b" rx="8"/>
  <text x="95" y="112" text-anchor="middle" fill="#94a3b8" font-size="10">観測期間</text>
  <text x="95" y="132" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">22日間</text>
  <text x="95" y="142" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: 単一環境]</text>
  <text x="95" y="152" text-anchor="middle" fill="#64748b" font-size="9">2026-03-07 〜 03-29</text>

  <rect x="180" y="90" width="150" height="72" fill="#1e293b" rx="8"/>
  <text x="255" y="112" text-anchor="middle" fill="#94a3b8" font-size="10">クラッシュ</text>
  <text x="255" y="136" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="700">0回</text>
  <text x="255" y="148" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: 単一環境]</text>

  <rect x="340" y="90" width="150" height="72" fill="#1e293b" rx="8"/>
  <text x="415" y="112" text-anchor="middle" fill="#94a3b8" font-size="10">活動日数</text>
  <text x="415" y="136" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">12日</text>
  <text x="415" y="148" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: 単一環境]</text>

  <rect x="500" y="90" width="160" height="72" fill="#1e293b" rx="8"/>
  <text x="580" y="112" text-anchor="middle" fill="#94a3b8" font-size="10">総メッセージ</text>
  <text x="580" y="136" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">22,557</text>
  <text x="580" y="148" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: 単一環境]</text>

  <!-- Row 2 -->
  <rect x="20" y="174" width="210" height="72" fill="#1e293b" rx="8"/>
  <text x="125" y="196" text-anchor="middle" fill="#94a3b8" font-size="10">jsonlサイズ（セッション全体）</text>
  <text x="125" y="220" text-anchor="middle" fill="#f97316" font-size="18" font-weight="600">170 MB</text>
  <text x="125" y="230" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: 単一環境]</text>
  <text x="125" y="240" text-anchor="middle" fill="#64748b" font-size="9">38,388行</text>

  <rect x="240" y="174" width="60" height="72" fill="none"/>
  <text x="270" y="216" text-anchor="middle" fill="#facc15" font-size="22">→</text>

  <rect x="310" y="174" width="210" height="72" fill="#1e293b" rx="8"/>
  <text x="415" y="196" text-anchor="middle" fill="#94a3b8" font-size="10">DB外部化後（observed）</text>
  <text x="415" y="220" text-anchor="middle" fill="#22c55e" font-size="18" font-weight="600">5.7 MB</text>
  <text x="415" y="230" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: 単一環境]</text>
  <text x="415" y="240" text-anchor="middle" fill="#64748b" font-size="9">22,557行の構造化データ</text>

  <rect x="530" y="174" width="130" height="72" fill="#22c55e" fill-opacity="0.1" rx="8" stroke="#22c55e" stroke-width="1"/>
  <text x="595" y="196" text-anchor="middle" fill="#94a3b8" font-size="10">削減率（observed）</text>
  <text x="595" y="222" text-anchor="middle" fill="#22c55e" font-size="22" font-weight="700">97% [observed: 単一環境]</text>

  <!-- Session ID -->
  <text x="340" y="272" text-anchor="middle" fill="#475569" font-size="9">session: 0a78cdcd-f5a2-4ad1-83d0-ace8257f48bf</text>

  <!-- Footer -->
  <text x="340" y="292" text-anchor="middle" fill="#64748b" font-size="10">著者の環境では、PostgreSQL外部化によりコンテキスト常駐データが97%削減 [observed: 単一環境]。</text>
  <text x="340" y="308" text-anchor="middle" fill="#475569" font-size="9">著者の環境での観測値。ご自身の環境で検証してください。</text>
</svg>
