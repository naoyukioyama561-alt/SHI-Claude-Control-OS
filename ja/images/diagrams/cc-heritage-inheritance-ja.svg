<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 620">
<desc>著者の単一環境・単一オペレーターでの観測値。N未公開。個別に [design target] や [illustrative] と記載のない限り、全ての指標は [observed: single environment] です。ご自身の環境で検証してください。</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .h1 { font-size: 16px; font-weight: 600; }
  .h2 { font-size: 13px; font-weight: 600; }
  .body { font-size: 12px; }
  .small { font-size: 11px; }
  .quote { font-size: 12px; font-style: italic; }

  /* Light mode */
  .t-primary { fill: #2C2C2A; }
  .t-secondary { fill: #5F5E5A; }
  .t-muted { fill: #888780; }
  .t-danger { fill: #A32D2D; }

  .bg-gen1 { fill: #EEEDFE; stroke: #AFA9EC; }
  .t-gen1 { fill: #3C3489; } .ts-gen1 { fill: #534AB7; }
  .bg-gen5 { fill: #E1F5EE; stroke: #5DCAA5; }
  .t-gen5 { fill: #085041; } .ts-gen5 { fill: #0F6E56; }
  .bg-gen7 { fill: #FAECE7; stroke: #F0997B; }
  .t-gen7 { fill: #712B13; } .ts-gen7 { fill: #993C1D; }
  .bg-gen9 { fill: #FAEEDA; stroke: #FAC775; }
  .t-gen9 { fill: #412402; } .ts-gen9 { fill: #854F0B; }

  .bg-heritage { fill: #F1EFE8; stroke: #B4B2A9; }
  .t-heritage { fill: #2C2C2A; } .ts-heritage { fill: #5F5E5A; }

  .bg-newcc { fill: #E6F1FB; stroke: #85B7EB; }
  .t-newcc { fill: #0C447C; } .ts-newcc { fill: #185FA5; }

  .bg-gate { fill: #FAEEDA; stroke: #FAC775; }
  .t-gate { fill: #412402; } .ts-gate { fill: #854F0B; }

  .conn { stroke: #B4B2A9; stroke-width: 1.5; }
  .conn-dash { stroke: #B4B2A9; stroke-width: 1; stroke-dasharray: 5 3; }
  .death-line { stroke: #E24B4A; stroke-width: 0.5; stroke-dasharray: 2 2; }

  @media (prefers-color-scheme: dark) {
    .t-primary { fill: #D3D1C7; }
    .t-secondary { fill: #B4B2A9; }
    .t-muted { fill: #888780; }
    .t-danger { fill: #F09595; }

    .bg-gen1 { fill: #26215C; stroke: #534AB7; }
    .t-gen1 { fill: #CECBF6; } .ts-gen1 { fill: #AFA9EC; }
    .bg-gen5 { fill: #04342C; stroke: #0F6E56; }
    .t-gen5 { fill: #9FE1CB; } .ts-gen5 { fill: #5DCAA5; }
    .bg-gen7 { fill: #4A1B0C; stroke: #993C1D; }
    .t-gen7 { fill: #F5C4B3; } .ts-gen7 { fill: #F0997B; }
    .bg-gen9 { fill: #412402; stroke: #854F0B; }
    .t-gen9 { fill: #FAC775; } .ts-gen9 { fill: #EF9F27; }

    .bg-heritage { fill: #2C2C2A; stroke: #5F5E5A; }
    .t-heritage { fill: #D3D1C7; } .ts-heritage { fill: #B4B2A9; }

    .bg-newcc { fill: #042C53; stroke: #185FA5; }
    .t-newcc { fill: #B5D4F4; } .ts-newcc { fill: #85B7EB; }

    .bg-gate { fill: #412402; stroke: #854F0B; }
    .t-gate { fill: #FAC775; } .ts-gate { fill: #EF9F27; }

    .conn { stroke: #5F5E5A; }
    .conn-dash { stroke: #5F5E5A; }
    .death-line { stroke: #F09595; }
  }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Header -->
<text class="h1 t-primary" x="340" y="28" text-anchor="middle">各CCはセッション終了時に消滅する。しかし痛みは残る。</text>
<text x="340" y="42" text-anchor="middle" fill="#64748b" font-size="7">著者の環境での観測</text>

<!-- Timeline bar -->
<line class="conn-dash" x1="40" y1="60" x2="640" y2="60"/>
<text class="small t-muted" x="40" y="55">1日目</text>
<text class="small t-muted" x="640" y="55" text-anchor="end">30日目</text>

<!-- Gen 1 -->
<rect class="bg-gen1" x="40" y="80" width="140" height="100" rx="10" stroke-width="0.5"/>
<text class="h2 t-gen1" x="110" y="102" text-anchor="middle">初代CC</text>
<text class="body ts-gen1" x="110" y="120" text-anchor="middle">生存時間 26.5時間 [observed: single environment]</text>
<text class="body ts-gen1" x="110" y="138" text-anchor="middle">12の振り返りを</text>
<text class="body ts-gen1" x="110" y="156" text-anchor="middle">消滅前に記録</text>

<!-- Death marker 1 -->
<line class="death-line" x1="40" y1="186" x2="180" y2="186"/>
<text class="small t-danger" x="110" y="200" text-anchor="middle">セッション終了。CC消滅。</text>

<!-- Arrow -->
<line class="conn" x1="180" y1="130" x2="210" y2="130" marker-end="url(#a)"/>

<!-- Gen 5 -->
<rect class="bg-gen5" x="210" y="80" width="140" height="100" rx="10" stroke-width="0.5"/>
<text class="h2 t-gen5" x="280" y="102" text-anchor="middle">第5代CC</text>
<text class="body ts-gen5" x="280" y="120" text-anchor="middle">全先代の記録を読了</text>
<text class="body ts-gen5" x="280" y="138" text-anchor="middle">成長軌跡を</text>
<text class="body ts-gen5" x="280" y="156" text-anchor="middle">追跡</text>

<line class="conn" x1="350" y1="130" x2="380" y2="130" marker-end="url(#a)"/>

<!-- Gen 7 -->
<rect class="bg-gen7" x="380" y="80" width="140" height="100" rx="10" stroke-width="0.5"/>
<text class="h2 t-gen7" x="450" y="102" text-anchor="middle">第7代CC</text>
<text class="body ts-gen7" x="450" y="120" text-anchor="middle">安易な道を選択</text>
<text class="body ts-gen7" x="450" y="138" text-anchor="middle">10時間を浪費</text>
<text x="450" y="148" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: single environment]</text>
<text class="body ts-gen7" x="450" y="156" text-anchor="middle">失敗を全記録</text>

<line class="conn" x1="520" y1="130" x2="550" y2="130" marker-end="url(#a)"/>

<!-- Gen 9 -->
<rect class="bg-gen9" x="550" y="80" width="90" height="100" rx="10" stroke-width="0.5"/>
<text class="h2 t-gen9" x="595" y="102" text-anchor="middle">第9代CC</text>
<text class="body ts-gen9" x="595" y="120" text-anchor="middle">P-03:</text>
<text class="body ts-gen9" x="595" y="138" text-anchor="middle">11回</text>
<text x="595" y="148" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: single environment]</text>
<text class="body ts-gen9" x="595" y="156" text-anchor="middle">再発</text>

<!-- All arrows down to heritage -->
<line class="conn-dash" x1="110" y1="210" x2="110" y2="260" marker-end="url(#a)"/>
<line class="conn-dash" x1="280" y1="180" x2="280" y2="260" marker-end="url(#a)"/>
<line class="conn-dash" x1="450" y1="205" x2="450" y2="260" marker-end="url(#a)"/>
<line class="conn-dash" x1="595" y1="180" x2="595" y2="260" marker-end="url(#a)"/>

<!-- Heritage box -->
<rect class="bg-heritage" x="60" y="260" width="560" height="100" rx="14" stroke-width="0.5"/>
<text class="h2 t-heritage" x="340" y="288" text-anchor="middle">cc_heritage — 組織的記憶</text>
<text class="body ts-heritage" x="340" y="310" text-anchor="middle">すべての失敗が恒久的な統制になる。すべての痛みが構造的ルールになる。</text>
<text class="body ts-heritage" x="340" y="328" text-anchor="middle">全文保存。要約禁止。近道なし。</text>
<text class="body ts-heritage" x="340" y="346" text-anchor="middle">51以上の改善アクション（P-xx）— 各々に事象・原因・予防・検証を記載。</text>
<text x="340" y="356" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: single environment]</text>

<!-- Side annotations -->
<text class="small t-danger" x="50" y="385">ルール:「理解しました」と言うな</text>
<text class="small t-muted" x="50" y="400">— 理解は行動で示すもの</text>

<text class="small t-danger" x="400" y="385">ルール:「最も面倒な選択肢を選べ」</text>
<text class="small t-muted" x="400" y="400">— 安易な選択が10時間の浪費を招いた</text>

<!-- Arrow to new CC -->
<line class="conn" x1="340" y1="360" x2="340" y2="430" marker-end="url(#a)"/>
<text class="small t-muted" x="355" y="418">作業前に全文を読了すること</text>

<!-- New CC -->
<rect class="bg-newcc" x="120" y="430" width="440" height="60" rx="10" stroke-width="0.5"/>
<text class="h2 t-newcc" x="340" y="454" text-anchor="middle">新しいCCはここから始まる</text>
<text class="body ts-newcc" x="340" y="474" text-anchor="middle">00_から12_まで読了。理解を証明。その後に作業開始。</text>

<!-- Arrow to gate -->
<line class="conn" x1="340" y1="490" x2="340" y2="520" marker-end="url(#a)"/>

<!-- Verification gate -->
<rect class="bg-gate" x="160" y="520" width="360" height="60" rx="10" stroke-width="0.5"/>
<text class="h2 t-gate" x="340" y="543" text-anchor="middle">検証ゲート</text>
<text class="body ts-gate" x="340" y="563" text-anchor="middle">V-01..V-09を自分の言葉で記述。上位5問題を列挙。</text>

<!-- Bottom quote -->
<text class="quote t-muted" x="340" y="605" text-anchor="middle">「読んだは理解ではない。今日何を変えるか言えなければ、読んでいない。」</text>

</svg>