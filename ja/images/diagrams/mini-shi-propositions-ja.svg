<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" font-family="Segoe UI, Arial, sans-serif">
<rect fill="#0f172a" width="400" height="160" rx="8"/>

<!-- Title -->
<text fill="#e2e8f0" font-size="10" font-weight="600" x="200" y="14" text-anchor="middle">SHI理論: 未適用 vs 適用</text>

<!-- Left column: Without SHI (problems) -->
<text fill="#f87171" font-size="8" font-weight="600" x="100" y="28" text-anchor="middle">SHI未適用（問題）</text>

<rect fill="#450a0a" stroke="#991b1b" stroke-width="0.5" x="8" y="34" width="174" height="24" rx="4"/>
<text fill="#fca5a5" font-size="7.5" x="95" y="49" text-anchor="middle">権限がないと動かない</text>

<rect fill="#450a0a" stroke="#991b1b" stroke-width="0.5" x="8" y="62" width="174" height="24" rx="4"/>
<text fill="#fca5a5" font-size="7.5" x="95" y="77" text-anchor="middle">フレームが消える（継承不能）</text>

<rect fill="#450a0a" stroke="#991b1b" stroke-width="0.5" x="8" y="90" width="174" height="24" rx="4"/>
<text fill="#fca5a5" font-size="7.5" x="95" y="105" text-anchor="middle">情報不足で判断停止</text>

<rect fill="#450a0a" stroke="#991b1b" stroke-width="0.5" x="8" y="118" width="174" height="24" rx="4"/>
<text fill="#fca5a5" font-size="7.5" x="95" y="133" text-anchor="middle">意識的推論に依存（脆弱）</text>

<!-- Center arrows -->
<text fill="#38bdf8" font-size="10" font-weight="600" x="200" y="49" text-anchor="middle">→</text>
<text fill="#38bdf8" font-size="10" font-weight="600" x="200" y="77" text-anchor="middle">→</text>
<text fill="#38bdf8" font-size="10" font-weight="600" x="200" y="105" text-anchor="middle">→</text>
<text fill="#38bdf8" font-size="10" font-weight="600" x="200" y="133" text-anchor="middle">→</text>

<!-- Right column: With SHI (solutions) -->
<text fill="#4ade80" font-size="8" font-weight="600" x="308" y="28" text-anchor="middle">SHI適用（効果）</text>

<rect fill="#052e16" stroke="#22c55e" stroke-width="0.5" x="218" y="34" width="174" height="24" rx="4"/>
<text fill="#86efac" font-size="7.5" x="305" y="44" text-anchor="middle">P1: 権限なしに整合発火</text>
<text fill="#4ade80" font-size="6.5" x="305" y="54" text-anchor="middle">構造条件で自律的に動作</text>

<rect fill="#052e16" stroke="#22c55e" stroke-width="0.5" x="218" y="62" width="174" height="24" rx="4"/>
<text fill="#86efac" font-size="7.5" x="305" y="72" text-anchor="middle">P2: フレームの自己複製</text>
<text fill="#4ade80" font-size="6.5" x="305" y="82" text-anchor="middle">痛み経験が次世代に継承</text>

<rect fill="#052e16" stroke="#22c55e" stroke-width="0.5" x="218" y="90" width="174" height="24" rx="4"/>
<text fill="#86efac" font-size="7.5" x="305" y="100" text-anchor="middle">P3: 情報ギャップ下での判断</text>
<text fill="#4ade80" font-size="6.5" x="305" y="110" text-anchor="middle">不完全情報でも構造が補完</text>

<rect fill="#052e16" stroke="#22c55e" stroke-width="0.5" x="218" y="118" width="174" height="24" rx="4"/>
<text fill="#86efac" font-size="7.5" x="305" y="128" text-anchor="middle">T-1: 意識的推論主体は不要</text>
<text fill="#4ade80" font-size="6.5" x="305" y="138" text-anchor="middle">構造が推論を代替</text>

<!-- Bottom -->
<text fill="#94a3b8" font-size="8" x="200" y="154" text-anchor="middle">構造的条件が整合の発火を決定する。意識は不要。</text>
</svg>