<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" font-family="Segoe UI, Arial, sans-serif">
  <desc>著者の単一環境・単一オペレーターでの観測値。N未公開。個別に [design target]（設計目標） や [illustrative]（例示値） と記載のない限り、全ての指標は [observed: single environment]（観測値：単一環境） です。ご自身の環境で検証してください。</desc>
  <rect width="320" height="160" fill="#1e293b" rx="10"/>
  <text x="160" y="24" text-anchor="middle" fill="#94a3b8" font-size="10">品質システム状態（著者環境での観測）</text>
  <text x="160" y="35" text-anchor="middle" fill="#64748b" font-size="7">著者の環境での観測</text>
  <text x="80" y="54" text-anchor="middle" fill="#94a3b8" font-size="9">4+1層</text>
  <text x="80" y="74" text-anchor="middle" fill="#22c55e" font-size="18" font-weight="700">稼働中</text>
  <text x="240" y="54" text-anchor="middle" fill="#94a3b8" font-size="9">reason_code</text>
  <text x="240" y="74" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">30種</text>
  <text x="240" y="84" text-anchor="middle" fill="#94a3b8" font-size="7">[observed: single environment]</text>
  <line x1="16" y1="90" x2="304" y2="90" stroke="#334155" stroke-width="0.5"/>
  <text x="24" y="110" fill="#94a3b8" font-size="9">必須5セット検査</text>
  <text x="290" y="110" text-anchor="end" fill="#22c55e" font-size="10">強制適用</text>
  <text x="24" y="130" fill="#94a3b8" font-size="9">パターン昇格（同一code 2回以上）</text>
  <text x="290" y="130" text-anchor="end" fill="#22c55e" font-size="10">自動</text>
  <text x="160" y="152" text-anchor="middle" fill="#475569" font-size="8">著者の環境での観測。ご自身の環境で検証してください。</text>
</svg>
