<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" font-family="Segoe UI, Arial, sans-serif">
  <desc>著者の単一環境・単一オペレーターでの観測値。N未公開。個別に [design target] や [illustrative] と記載のない限り、全ての指標は [observed: 単一環境] です。ご自身の環境で検証してください。</desc>
  <rect width="320" height="200" fill="#0f172a" rx="10"/>

  <!-- Title -->
  <text x="160" y="20" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">なぜ3層なのか（著者環境での観測）</text>
  <text x="160" y="30" text-anchor="middle" fill="#64748b" font-size="7">著者の環境での観測</text>

  <!-- Supervisor -->
  <circle cx="24" cy="44" r="6" fill="#22c55e"/>
  <text x="38" y="48" fill="#e2e8f0" font-size="10" font-weight="500">監督（Supervisor）</text>
  <text x="306" y="48" text-anchor="end" fill="#22c55e" font-size="9">稼働中</text>
  <text x="38" y="60" fill="#94a3b8" font-size="8">2,891件のユーザー指示を監視・判断</text>
  <text x="38" y="68" fill="#94a3b8" font-size="7">[observed: 単一環境]</text>

  <!-- Relay -->
  <circle cx="24" cy="80" r="6" fill="#22c55e"/>
  <text x="38" y="84" fill="#e2e8f0" font-size="10" font-weight="500">中継（5モデル合議）</text>
  <text x="306" y="84" text-anchor="end" fill="#22c55e" font-size="9">稼働中</text>
  <text x="38" y="96" fill="#94a3b8" font-size="8">5モデルで合議し監視・通知を転送</text>

  <!-- Worker -->
  <circle cx="24" cy="116" r="6" fill="#22c55e"/>
  <text x="38" y="120" fill="#e2e8f0" font-size="10" font-weight="500">作業（Worker）</text>
  <text x="306" y="120" text-anchor="end" fill="#22c55e" font-size="9">稼働中</text>
  <text x="38" y="132" fill="#94a3b8" font-size="8">22,557メッセージを処理・実装実行</text>
  <text x="38" y="140" fill="#94a3b8" font-size="7">[observed: 単一環境]</text>

  <line x1="14" y1="146" x2="306" y2="146" stroke="#334155" stroke-width="0.5"/>

  <!-- Warning: what happens without separation -->
  <rect x="14" y="152" width="292" height="38" rx="6" fill="#450a0a" stroke="#991b1b" stroke-width="0.5"/>
  <text x="160" y="168" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="500">1つのAIが全部やると:</text>
  <text x="160" y="182" text-anchor="middle" fill="#f87171" font-size="8">コンテキスト圧力 → 判断劣化 → 品質崩壊</text>
</svg>